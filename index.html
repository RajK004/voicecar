<!DOCTYPE html>
<html>
<head>
  <title>Smart Car Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #1a1a2e; color: white; padding: 20px; user-select: none; }
    h1 { font-size: 22px; color: #00d4ff; margin-bottom: 10px; }
    .status { background: #16213e; padding: 12px; border-radius: 10px; margin: 8px 0; font-size: 15px; }
    .btn { width: 100%; padding: 15px; margin: 6px 0; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; touch-action: manipulation; }
    .row { display: flex; gap: 8px; margin: 6px 0; }
    .row .btn { width: 50%; }
    
    #btBtn      { background: #0066ff; color: white; }
    #gestureBtn { background: #cc6600; color: white; }
    #voiceBtn   { background: #006633; color: white; }
    #autoBtn    { background: #8e44ad; color: white; }
    #remoteBtn  { background: #b30059; color: white; }
    #listenBtn  { background: #00aa44; color: white; }
    #stopBtn    { background: #cc0000; color: white; }
    
    .dpad { background: #334; color: #00d4ff; font-size: 20px; border: 2px solid #00d4ff; }
    .dpad:active { background: #00d4ff; color: #1a1a2e; }

    .modeDisplay { font-size: 18px; font-weight: bold; padding: 12px; background: #16213e; border-radius: 10px; margin: 8px 0; }
    #commandDisplay { font-size: 28px; font-weight: bold; color: #00ff88; padding: 15px; background: #16213e; border-radius: 10px; margin: 8px 0; min-height: 60px; }
    .active-mode { border: 3px solid #00ff88; }
    #debugDiv { font-size: 11px; color: #888; margin-top: 15px; }
  </style>
</head>
<body>

<h1>🚗 Smart Car Control</h1>
<div class="status" id="statusDiv">Loading model...</div>
<div id="commandDisplay">---</div>
<div class="modeDisplay" id="modeDisplay">Mode: GESTURE 🤚</div>

<button class="btn" id="btBtn" onclick="connectBluetooth()">🔵 Connect Bluetooth</button>

<div class="row">
  <button class="btn" id="gestureBtn" onclick="setMode('gesture')" disabled>🤚 Gesture</button>
  <button class="btn" id="voiceBtn"   onclick="setMode('voice')"   disabled>🎤 Voice</button>
</div>
<div class="row">
  <button class="btn" id="autoBtn"    onclick="setMode('auto')"    disabled>🤖 Auto</button>
  <button class="btn" id="remoteBtn"  onclick="setMode('remote')"  disabled>🎮 Remote</button>
</div>

<button class="btn" id="listenBtn" onclick="startListening()" style="display:none;" disabled>🎤 Start Listening</button>
<button class="btn" id="stopBtn"   onclick="stopListening()"  style="display:none;" disabled>⏹ Stop Listening</button>

<div id="remoteControls" style="display:none; margin-top: 20px;">
  <button class="btn dpad" onpointerdown="sendRemote('FORWARD')" onpointerup="sendRemote('STOP')" onpointerleave="sendRemote('STOP')">⬆️ Forward</button>
  <div class="row">
    <button class="btn dpad" onpointerdown="sendRemote('LEFT')" onpointerup="sendRemote('STOP')" onpointerleave="sendRemote('STOP')">⬅️ Left</button>
    <button class="btn dpad" onpointerdown="sendRemote('RIGHT')" onpointerup="sendRemote('STOP')" onpointerleave="sendRemote('STOP')">➡️ Right</button>
  </div>
  <button class="btn dpad" onpointerdown="sendRemote('BACKWARD')" onpointerup="sendRemote('STOP')" onpointerleave="sendRemote('STOP')">⬇️ Backward</button>
</div>

<div id="debugDiv"></div>

<script>
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/vWCoKIgKY/";
const THRESHOLD = 0.85;

let recognizer, btCharacteristic;
let isListening = false;
let currentMode = "gesture";
let lastCommand = "";
let lastCommandTime = 0;

function log(msg) { document.getElementById("debugDiv").innerText = msg; }

function loadScript(url) {
  return new Promise((res, rej) => {
    const s = document.createElement('script'); s.src = url; s.onload = res; s.onerror = rej; document.head.appendChild(s);
  });
}

async function init() {
  try {
    document.getElementById("statusDiv").innerText = "Loading TensorFlow...";
    await loadScript("https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js");
    await loadScript("https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@0.5.4/dist/speech-commands.min.js");
    document.getElementById("statusDiv").innerText = "Loading voice model...";
    recognizer = speechCommands.create("BROWSER_FFT", undefined, MODEL_URL + "model.json", MODEL_URL + "metadata.json");
    await recognizer.ensureModelLoaded();
    document.getElementById("statusDiv").innerText = "✅ Model ready! Connect Bluetooth.";
  } catch(e) { document.getElementById("statusDiv").innerText = "❌ Load failed: " + e.message; }
}

async function connectBluetooth() {
  try {
    document.getElementById("statusDiv").innerText = "Connecting...";
    const device = await navigator.bluetooth.requestDevice({ filters: [{ name: "HybridCar_Hand" }], optionalServices: [SERVICE_UUID] });
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    btCharacteristic = await service.getCharacteristic(CHAR_UUID);

    document.getElementById("statusDiv").innerText = "✅ Bluetooth Connected!";
    document.getElementById("btBtn").innerText = "✅ Connected";
    ["gestureBtn", "voiceBtn", "autoBtn", "remoteBtn"].forEach(id => document.getElementById(id).disabled = false);
    updateModeDisplay();
    await sendRaw("MODE:1");
  } catch(e) { document.getElementById("statusDiv").innerText = "❌ BT Error: " + e.message; }
}

async function sendRaw(data) {
  try { if (btCharacteristic) await btCharacteristic.writeValue(new TextEncoder().encode(data)); log("Sent: " + data); } 
  catch(e) { log("Send error: " + e.message); }
}

function sendRemote(cmd) {
  if (currentMode !== "remote") return;
  document.getElementById("commandDisplay").innerText = "🎮 " + cmd;
  sendRaw("CMD:" + cmd);
}

async function setMode(mode) {
  currentMode = mode;
  updateModeDisplay();
  
  let modeCode = "MODE:1";
  if(mode === "voice") modeCode = "MODE:2";
  if(mode === "auto") modeCode = "MODE:3";
  if(mode === "remote") modeCode = "MODE:4";
  
  await sendRaw(modeCode);
  if (mode !== "voice" && isListening) stopListening();
}

function updateModeDisplay() {
  const d = document.getElementById("modeDisplay");
  ["gestureBtn", "voiceBtn", "autoBtn", "remoteBtn"].forEach(id => document.getElementById(id).classList.remove("active-mode"));

  document.getElementById("listenBtn").style.display = "none";
  document.getElementById("stopBtn").style.display   = "none";
  document.getElementById("remoteControls").style.display = "none";

  if (currentMode === "gesture") {
    d.innerText = "Mode: GESTURE 🤚"; d.style.color = "#ffaa44";
    document.getElementById("gestureBtn").classList.add("active-mode");
  } else if (currentMode === "auto") {
    d.innerText = "Mode: AUTO PILOT 🤖"; d.style.color = "#8e44ad";
    document.getElementById("autoBtn").classList.add("active-mode");
  } else if (currentMode === "remote") {
    d.innerText = "Mode: REMOTE 🎮"; d.style.color = "#b30059";
    document.getElementById("remoteBtn").classList.add("active-mode");
    document.getElementById("remoteControls").style.display = "block";
  } else {
    d.innerText = "Mode: VOICE 🎤"; d.style.color = "#00ff88";
    document.getElementById("voiceBtn").classList.add("active-mode");
    document.getElementById("listenBtn").style.display = "block";
    document.getElementById("stopBtn").style.display   = "block";
    document.getElementById("listenBtn").disabled = false;
  }
}

async function startListening() {
  if (!recognizer || isListening || currentMode !== "voice") return;
  isListening = true;
  document.getElementById("listenBtn").disabled = true; document.getElementById("stopBtn").disabled = false;
  document.getElementById("statusDiv").innerText = "🎤 Listening...";

  await recognizer.listen(result => {
    const labels = recognizer.wordLabels();
    const scores = result.scores;
    let maxScore = 0, maxLabel = "";
    labels.forEach((label, i) => { if (scores[i] > maxScore) { maxScore = scores[i]; maxLabel = label; } });

    const lower = maxLabel.toLowerCase();
    if (maxScore >= THRESHOLD && lower !== "background noise" && lower !== "others" && lower !== "_background_noise_") {
      const now = Date.now();
      if (lower !== lastCommand || now - lastCommandTime > 1500) {
        lastCommand = lower; lastCommandTime = now;
        document.getElementById("commandDisplay").innerText = "▶ " + lower.toUpperCase();
        sendRaw("CMD:" + lower.toUpperCase());
      }
    }
  }, { overlapFactor: 0.75, probabilityThreshold: 0.5 });
}

function stopListening() {
  if (recognizer && isListening) recognizer.stopListening();
  isListening = false;
  document.getElementById("listenBtn").disabled = false; document.getElementById("stopBtn").disabled = true;
  document.getElementById("statusDiv").innerText = "⏹ Stopped";
  document.getElementById("commandDisplay").innerText = "---";
}

window.onload = init;
</script>
</body>
</html>
