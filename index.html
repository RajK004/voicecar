```html
<!DOCTYPE html>
<html>
<head>
  <title>Smart Car Voice Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #1a1a2e;
      color: white;
      padding: 20px;
    }
    h1 { font-size: 22px; color: #00d4ff; }
    .status {
      background: #16213e;
      padding: 15px;
      border-radius: 10px;
      margin: 10px 0;
      font-size: 16px;
    }
    .btn {
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .row {
      display: flex;
      gap: 8px;
      margin: 8px 0;
    }
    .row .btn { width: 33%; }
    #btBtn { background: #0066ff; color: white; }
    #gestureBtn { background: #cc6600; color: white; }
    #voiceBtn { background: #006600; color: white; }
    #autoBtn { background: #660066; color: white; }
    #listenBtn { background: #00aa44; color: white; }
    #stopBtn { background: #cc0000; color: white; }
    .modeDisplay {
      font-size: 18px;
      font-weight: bold;
      padding: 12px;
      background: #16213e;
      border-radius: 10px;
      margin: 8px 0;
    }
    .confidence {
      background: #16213e;
      padding: 10px;
      border-radius: 8px;
      margin: 5px 0;
      text-align: left;
      font-size: 14px;
    }
    .bar {
      height: 20px;
      background: #00d4ff;
      border-radius: 5px;
      margin-top: 5px;
      transition: width 0.2s;
    }
    #commandDisplay {
      font-size: 28px;
      font-weight: bold;
      color: #00ff88;
      padding: 15px;
      background: #16213e;
      border-radius: 10px;
      margin: 10px 0;
    }
    .active {
      border: 3px solid #00ff88 !important;
    }
  </style>
</head>
<body>

<h1>🚗 Smart Car Control</h1>
<div class="status" id="statusDiv">
  Loading model...
</div>
<div id="commandDisplay">---</div>
<div class="modeDisplay" id="modeDisplay">
  Mode: GESTURE 🤚
</div>

<button class="btn" id="btBtn" onclick="connectBluetooth()">
  🔵 Connect Bluetooth
</button>

<div class="row">
  <button class="btn" id="gestureBtn" onclick="setMode('gesture')" disabled>🤚 Gesture</button>
  <button class="btn" id="voiceBtn" onclick="setMode('voice')" disabled>🎤 Voice</button>
  <button class="btn" id="autoBtn" onclick="setMode('auto')" disabled>🚗 Auto</button>
</div>

<button class="btn" id="listenBtn" onclick="startListening()" disabled>🎤 Start Listening</button>
<button class="btn" id="stopBtn" onclick="stopListening()" disabled>⏹ Stop Listening</button>

<div id="predictions"></div>
<div id="debugDiv" style="font-size:12px;color:#aaa;margin-top:20px;"></div>

<script>
function loadScript(url) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = url;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

const MODEL_URL = "https://teachablemachine.withgoogle.com/models/vWCoKIgKY/";

let recognizer;
let btCharacteristic;
let lastCommand = "";
let lastCommandTime = 0;
let isListening = false;
let currentMode = "gesture";

function debug(msg) {
  document.getElementById("debugDiv").innerText = msg;
  console.log(msg);
}

function updateModeDisplay() {
  const d = document.getElementById("modeDisplay");
  const gBtn = document.getElementById("gestureBtn");
  const vBtn = document.getElementById("voiceBtn");
  const aBtn = document.getElementById("autoBtn");

  gBtn.classList.remove("active");
  vBtn.classList.remove("active");
  aBtn.classList.remove("active");

  if (currentMode === "gesture") {
    d.innerText = "Mode: GESTURE 🤚";
    d.style.color = "#cc6600";
    gBtn.classList.add("active");
    document.getElementById("listenBtn").style.display = "none";
    document.getElementById("stopBtn").style.display = "none";
  } else if (currentMode === "voice") {
    d.innerText = "Mode: VOICE 🎤 (Obstacle ON)";
    d.style.color = "#00ff88";
    vBtn.classList.add("active");
    document.getElementById("listenBtn").style.display = "block";
    document.getElementById("stopBtn").style.display = "block";
    document.getElementById("listenBtn").disabled = false;
  } else if (currentMode === "auto") {
    d.innerText = "Mode: AUTO 🚗 (Obstacle ON)";
    d.style.color = "#cc00cc";
    aBtn.classList.add("active");
    document.getElementById("listenBtn").style.display = "none";
    document.getElementById("stopBtn").style.display = "none";
    if (isListening) stopListening();
  }
}

async function init() {
  try {
    await loadScript("https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js");
    await loadScript("https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@0.5.4/dist/speech-commands.min.js");
    await loadModel();
  } catch(e) {
    debug(e.message);
  }
}

async function loadModel() {
  recognizer = speechCommands.create(
    "BROWSER_FFT",
    undefined,
    MODEL_URL + "model.json",
    MODEL_URL + "metadata.json"
  );

  await recognizer.ensureModelLoaded();
  setupBars(recognizer.wordLabels());
  updateModeDisplay();
  document.getElementById("statusDiv").innerText = "✅ Model loaded! Connect Bluetooth.";
}

function setupBars(labels) {
  let html = "<h3>Voice Detection:</h3>";
  labels.forEach(label => {
    const sid = label.replace(/\s+/g, '_');
    html += `<div class="confidence">${label}
      <div class="bar" id="bar_${sid}" style="width:0%"></div>
      <span id="pct_${sid}">0%</span>
    </div>`;
  });
  document.getElementById("predictions").innerHTML = html;
}

async function connectBluetooth() {
  const device = await navigator.bluetooth.requestDevice({
    filters: [{ name: "HybridCar_Hand" }],
    optionalServices: ["4fafc201-1fb5-459e-8fcc-c5c9c331914b"]
  });

  const server = await device.gatt.connect();
  const service = await server.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
  btCharacteristic = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");

  document.getElementById("statusDiv").innerText = "✅ Bluetooth Connected!";
  document.getElementById("btBtn").innerText = "✅ Connected";

  document.getElementById("gestureBtn").disabled = false;
  document.getElementById("voiceBtn").disabled = false;
  document.getElementById("autoBtn").disabled = false;

  await sendRaw("MODE:1");
}

async function sendRaw(cmd) {
  if (btCharacteristic) {
    const encoder = new TextEncoder();
    await btCharacteristic.writeValue(encoder.encode(cmd));
  }
}

async function setMode(mode) {
  currentMode = mode;
  updateModeDisplay();

  if (mode === "gesture") await sendRaw("MODE:1");
  else if (mode === "voice") await sendRaw("MODE:2");
  else if (mode === "auto") await sendRaw("MODE:3");
}

async function sendCommand(cmd) {
  const now = Date.now();
  if (cmd === lastCommand && now - lastCommandTime < 1500) return;

  lastCommand = cmd;
  lastCommandTime = now;

  document.getElementById("commandDisplay").innerText = "▶ " + cmd.toUpperCase();
  await sendRaw("CMD:" + cmd.toUpperCase());
}

async function startListening() {
  if (!recognizer || currentMode !== "voice") return;

  isListening = true;
  document.getElementById("listenBtn").disabled = true;
  document.getElementById("stopBtn").disabled = false;

  await recognizer.listen(result => {
    const labels = recognizer.wordLabels();
    const scores = result.scores;

    let maxScore = 0;
    let maxLabel = "";

    labels.forEach((label, i) => {
      if (scores[i] > maxScore) {
        maxScore = scores[i];
        maxLabel = label;
      }
    });

    if (maxScore > 0.85 && !["_background_noise_", "background noise", "others"].includes(maxLabel.toLowerCase())) {
      sendCommand(maxLabel.toLowerCase());
    }

  }, { overlapFactor: 0.75, probabilityThreshold: 0.5 });
}

function stopListening() {
  if (recognizer && isListening) recognizer.stopListening();
  isListening = false;

  document.getElementById("listenBtn").disabled = false;
  document.getElementById("stopBtn").disabled = true;
  document.getElementById("commandDisplay").innerText = "---";
}

window.onload = init;
</script>

</body>
</html>
