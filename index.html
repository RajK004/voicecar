<!DOCTYPE html>
<html>
<head>
  <title>Smart Car Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #1a1a2e;
      color: white;
      padding: 15px;
    }
    h1 { font-size: 22px; color: #00d4ff; margin-bottom: 8px; }
    .status {
      background: #16213e;
      padding: 10px;
      border-radius: 10px;
      margin: 6px 0;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      margin: 5px 0;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .row {
      display: flex;
      gap: 8px;
      margin: 5px 0;
    }
    .row .btn { width: 33.33%; }
    .row2 .btn { width: 50%; }

    #btBtn      { background: #0066ff; color: white; }
    #gestureBtn { background: #cc6600; color: white; }
    #voiceBtn   { background: #006633; color: white; }
    #remoteBtn  { background: #660066; color: white; }

    #listenBtn  { background: #00aa44; color: white; }
    #stopBtn    { background: #cc0000; color: white; }

    .modeDisplay {
      font-size: 17px;
      font-weight: bold;
      padding: 10px;
      background: #16213e;
      border-radius: 10px;
      margin: 6px 0;
    }
    #commandDisplay {
      font-size: 26px;
      font-weight: bold;
      color: #00ff88;
      padding: 12px;
      background: #16213e;
      border-radius: 10px;
      margin: 6px 0;
      min-height: 55px;
    }

    /* Remote control buttons */
    #remoteControls {
      display: none;
      margin: 8px 0;
    }
    .remote-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 6px 0;
    }
    .rc-btn {
      width: 85px;
      height: 75px;
      border: none;
      border-radius: 12px;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      background: #0055cc;
      color: white;
      transition: background 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }
    .rc-btn:active { background: #003399; transform: scale(0.95); }
    .rc-stop {
      width: 85px;
      height: 75px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      background: #cc0000;
      color: white;
      user-select: none;
      -webkit-user-select: none;
    }
    .rc-stop:active { background: #990000; }
    .rc-label {
      font-size: 10px;
      color: #aaa;
      margin-top: 3px;
    }

    .confidence {
      background: #16213e;
      padding: 7px 10px;
      border-radius: 8px;
      margin: 3px 0;
      text-align: left;
      font-size: 12px;
    }
    .bar {
      height: 16px;
      background: #00d4ff;
      border-radius: 5px;
      margin-top: 3px;
      transition: width 0.2s;
      min-width: 2px;
    }
    .active-mode { border: 3px solid #00ff88 !important; }
    #debugDiv { font-size: 10px; color: #666; margin-top: 10px; }
  </style>
</head>
<body>

<h1>🚗 Smart Car Control</h1>

<div class="status" id="statusDiv">Loading model...</div>
<div id="commandDisplay">---</div>
<div class="modeDisplay" id="modeDisplay">Mode: GESTURE 🤚</div>

<!-- Bluetooth Connect -->
<button class="btn" id="btBtn" onclick="connectBluetooth()">
  🔵 Connect Bluetooth
</button>

<!-- 3 Mode Buttons -->
<div class="row">
  <button class="btn" id="gestureBtn"
          onclick="setMode('gesture')" disabled>
    🤚 Gesture
  </button>
  <button class="btn" id="voiceBtn"
          onclick="setMode('voice')" disabled>
    🎤 Voice
  </button>
  <button class="btn" id="remoteBtn"
          onclick="setMode('remote')" disabled>
    🕹️ Remote
  </button>
</div>

<!-- Voice Control Buttons (shown only in voice mode) -->
<button class="btn" id="listenBtn"
        onclick="startListening()"
        style="display:none;" disabled>
  🎤 Start Listening
</button>
<button class="btn" id="stopBtn"
        onclick="stopListening()"
        style="display:none;" disabled>
  ⏹ Stop Listening
</button>

<!-- Remote Control Buttons (shown only in remote mode) -->
<div id="remoteControls">
  <!-- Forward -->
  <div class="remote-row">
    <div>
      <button class="rc-btn"
              onpointerdown="rcPress('forward')"
              onpointerup="rcRelease()"
              onpointerleave="rcRelease()">▲</button>
      <div class="rc-label">FORWARD</div>
    </div>
  </div>
  <!-- Left / Stop / Right -->
  <div class="remote-row">
    <div>
      <button class="rc-btn"
              onpointerdown="rcPress('left')"
              onpointerup="rcRelease()"
              onpointerleave="rcRelease()">◄</button>
      <div class="rc-label">LEFT</div>
    </div>
    <div>
      <button class="rc-stop"
              onpointerdown="rcPress('stop')"
              onpointerup="rcRelease()"
              onpointerleave="rcRelease()">⏹<br>STOP</button>
      <div class="rc-label">STOP</div>
    </div>
    <div>
      <button class="rc-btn"
              onpointerdown="rcPress('right')"
              onpointerup="rcRelease()"
              onpointerleave="rcRelease()">►</button>
      <div class="rc-label">RIGHT</div>
    </div>
  </div>
  <!-- Backward -->
  <div class="remote-row">
    <div>
      <button class="rc-btn"
              onpointerdown="rcPress('backward')"
              onpointerup="rcRelease()"
              onpointerleave="rcRelease()">▼</button>
      <div class="rc-label">BACKWARD</div>
    </div>
  </div>
</div>

<!-- Voice bars -->
<div id="predictions"></div>
<div id="debugDiv"></div>

<script>
const MODEL_URL =
  "https://teachablemachine.withgoogle.com/models/vWCoKIgKY/";
const THRESHOLD = 0.85;

const SERVICE_UUID =
  "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const CHAR_UUID =
  "beb5483e-36e1-4688-b7f5-ea07361b26a8";

let recognizer, btCharacteristic;
let isListening = false;
let currentMode = "gesture";
let lastCommand = "";
let lastCommandTime = 0;
let rcInterval = null;

function log(msg) {
  document.getElementById("debugDiv").innerText = msg;
}

// ── Load TF + Model ──────────────────────────────────────
function loadScript(url) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = url; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function init() {
  try {
    document.getElementById("statusDiv").innerText =
      "Loading TensorFlow...";
    await loadScript(
      "https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"
    );
    await loadScript(
      "https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@0.5.4/dist/speech-commands.min.js"
    );
    document.getElementById("statusDiv").innerText =
      "Loading voice model...";
    recognizer = speechCommands.create(
      "BROWSER_FFT", undefined,
      MODEL_URL + "model.json",
      MODEL_URL + "metadata.json"
    );
    await recognizer.ensureModelLoaded();
    document.getElementById("statusDiv").innerText =
      "✅ Model ready! Connect Bluetooth.";
    buildBars();
    log("Model loaded OK");
  } catch(e) {
    document.getElementById("statusDiv").innerText =
      "❌ Load failed: " + e.message;
    log("Error: " + e.message);
  }
}

// ── Confidence Bars ──────────────────────────────────────
function buildBars() {
  const labels = recognizer.wordLabels();
  let html =
    "<h3 style='margin:8px 0 4px;font-size:13px;'>" +
    "Voice Detection:</h3>";
  labels.forEach(label => {
    const id = label.replace(/\s+/g, '_');
    html += `
      <div class="confidence">${label}
        <div class="bar" id="bar_${id}"
             style="width:0%"></div>
        <span id="pct_${id}"
              style="font-size:11px;color:#aaa;">
          0%
        </span>
      </div>`;
  });
  document.getElementById("predictions").innerHTML = html;
}

// ── Bluetooth ────────────────────────────────────────────
async function connectBluetooth() {
  try {
    document.getElementById("statusDiv").innerText =
      "Connecting...";
    const device =
      await navigator.bluetooth.requestDevice({
        filters: [{ name: "HybridCar_Hand" }],
        optionalServices: [SERVICE_UUID]
      });
    const server  = await device.gatt.connect();
    const service =
      await server.getPrimaryService(SERVICE_UUID);
    btCharacteristic =
      await service.getCharacteristic(CHAR_UUID);

    document.getElementById("statusDiv").innerText =
      "✅ Bluetooth Connected!";
    document.getElementById("btBtn").innerText =
      "✅ Connected";
    document.getElementById("gestureBtn").disabled
      = false;
    document.getElementById("voiceBtn").disabled
      = false;
    document.getElementById("remoteBtn").disabled
      = false;

    updateModeDisplay();
    await sendRaw("MODE:1");
    log("BLE connected");
  } catch(e) {
    document.getElementById("statusDiv").innerText =
      "❌ BT Error: " + e.message;
    log("BT error: " + e.message);
  }
}

async function sendRaw(data) {
  try {
    if (btCharacteristic) {
      await btCharacteristic.writeValue(
        new TextEncoder().encode(data)
      );
      log("Sent: " + data);
    }
  } catch(e) {
    log("Send error: " + e.message);
  }
}

// ── Mode Switching ───────────────────────────────────────
async function setMode(mode) {
  currentMode = mode;
  updateModeDisplay();

  if (mode === "gesture") {
    await sendRaw("MODE:1");
  } else if (mode === "voice") {
    await sendRaw("MODE:2");
  } else if (mode === "remote") {
    await sendRaw("MODE:3");
    if (isListening) stopListening();
  }

  if (mode !== "voice" && isListening) {
    stopListening();
  }
}

function updateModeDisplay() {
  const d = document.getElementById("modeDisplay");
  const gBtn = document.getElementById("gestureBtn");
  const vBtn = document.getElementById("voiceBtn");
  const rBtn = document.getElementById("remoteBtn");
  const listenBtn =
    document.getElementById("listenBtn");
  const stopBtn =
    document.getElementById("stopBtn");
  const remoteDiv =
    document.getElementById("remoteControls");
  const predsDiv =
    document.getElementById("predictions");

  // Remove active from all
  gBtn.classList.remove("active-mode");
  vBtn.classList.remove("active-mode");
  rBtn.classList.remove("active-mode");

  // Hide all mode-specific UI first
  listenBtn.style.display  = "none";
  stopBtn.style.display    = "none";
  remoteDiv.style.display  = "none";
  predsDiv.style.display   = "block";

  if (currentMode === "gesture") {
    d.innerText = "Mode: GESTURE 🤚";
    d.style.color = "#ffaa44";
    gBtn.classList.add("active-mode");
    predsDiv.style.display = "none";

  } else if (currentMode === "voice") {
    d.innerText = "Mode: VOICE 🎤";
    d.style.color = "#00ff88";
    vBtn.classList.add("active-mode");
    listenBtn.style.display = "block";
    stopBtn.style.display   = "block";
    listenBtn.disabled = false;

  } else if (currentMode === "remote") {
    d.innerText = "Mode: REMOTE 🕹️";
    d.style.color = "#cc88ff";
    rBtn.classList.add("active-mode");
    remoteDiv.style.display = "block";
    predsDiv.style.display  = "none";
  }
}

// ── Remote Control ───────────────────────────────────────
function rcPress(cmd) {
  // Send immediately
  sendRemoteCmd(cmd);
  // Keep sending every 150ms while held
  rcInterval = setInterval(() => {
    sendRemoteCmd(cmd);
  }, 150);
}

function rcRelease() {
  // Stop repeating
  if (rcInterval) {
    clearInterval(rcInterval);
    rcInterval = null;
  }
  // Send stop
  sendRemoteCmd("stop");
  document.getElementById("commandDisplay")
    .innerText = "⏹ STOP";
}

async function sendRemoteCmd(cmd) {
  document.getElementById("commandDisplay")
    .innerText = "▶ " + cmd.toUpperCase();
  await sendRaw("RC:" + cmd.toUpperCase());
}

// ── Voice Listening ──────────────────────────────────────
async function startListening() {
  if (!recognizer || isListening ||
      currentMode !== "voice") return;
  isListening = true;
  document.getElementById("listenBtn").disabled
    = true;
  document.getElementById("stopBtn").disabled
    = false;
  document.getElementById("statusDiv").innerText
    = "🎤 Listening...";

  await recognizer.listen(result => {
    const labels = recognizer.wordLabels();
    const scores = result.scores;
    let maxScore = 0, maxLabel = "";

    labels.forEach((label, i) => {
      const id = label.replace(/\s+/g, '_');
      const pct = Math.round(scores[i] * 100);
      const bar =
        document.getElementById("bar_" + id);
      const pctEl =
        document.getElementById("pct_" + id);
      if (bar)   bar.style.width = pct + "%";
      if (pctEl) pctEl.innerText = pct + "%";
      if (scores[i] > maxScore) {
        maxScore = scores[i];
        maxLabel = label;
      }
    });

    const lower = maxLabel.toLowerCase();
    if (maxScore >= THRESHOLD &&
        lower !== "background noise" &&
        lower !== "others" &&
        lower !== "_background_noise_") {
      const now = Date.now();
      if (lower !== lastCommand ||
          now - lastCommandTime > 1500) {
        lastCommand = lower;
        lastCommandTime = now;
        document.getElementById("commandDisplay")
          .innerText = "▶ " + lower.toUpperCase();
        sendRaw("CMD:" + lower.toUpperCase());
      }
    }
  }, {
    overlapFactor: 0.75,
    probabilityThreshold: 0.5
  });

  log("Listening started");
}

function stopListening() {
  if (recognizer && isListening)
    recognizer.stopListening();
  isListening = false;
  document.getElementById("listenBtn").disabled
    = false;
  document.getElementById("stopBtn").disabled
    = true;
  document.getElementById("statusDiv").innerText
    = "⏹ Stopped";
  document.getElementById("commandDisplay")
    .innerText = "---";
  log("Listening stopped");
}

window.onload = init;
</script>
</body>
</html>
